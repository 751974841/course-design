<!DOCTYPE html>
<meta charset="utf-8">
<script>
    let test = document.getElementById("test");

    function display() {
        document.getElementById("test").style.display = "block";
    }
    function m_over() {
        document.getElementById("test").style.display = "none";

    }

    window.onload = function () {
    
    obj = document.getElementById("test").getElementsByTagName("li");


    for(i in obj){
        obj[i].onclick = function(){
            str = this.innerHTML;
            document.getElementById("test1").innerHTML = str;
        }
    }
}
</script>
<link href="/static/next/css/tryit.css?v=2017082407" rel="stylesheet" />
<style>
    .dropbtn {
        background-color: #4CAF50;
        color: white;
        padding: 16px;
        font-size: 16px;
        border: none;
        cursor: pointer;
    }

    .dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        right: 0;
        background-color: pink;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
    }

        .dropdown-content li {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

            .dropdown-content li:hover {
                background-color: #f1f1f1
            }



    .dropdown:hover .dropbtn {
        background-color: #3e8e41;
    }
</style>
<h2>下拉内容的对齐方式</h2>
<p>left 和 right 属性指定了下拉内容是从左到右或从右到左。</p>
<div class="dropdown" style="float:left;">
    <button class="dropbtn" onclick="display()"  id="test1">左</button>
    <div class="dropdown-content" onmouseleave="m_over(this)" id="test" style="left:0;">
        <ul >
            <li class="aaa">简单教程1 </li>
            <li class="aaa">简单教程2 </li>
            <li class="aaa">简单教程3 </li>
        </ul>
    </div>
</div>
<div class="dropdown" style="float:left;">
    <button class="dropbtn" onclick="display()" id="test1">右</button>
    <div class="dropdown-content" onmouseleave="m_over(this)" id="test" style="left:0;">
        <ul>
            <li class="aaa">简单教程1 </li>
            <li class="aaa">简单教程2 </li>
            <li class="aaa">简单教程3 </li>
        </ul>
    </div>
</div>
